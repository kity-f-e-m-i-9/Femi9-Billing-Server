name: Publish Website to CPanel
on:
  push:
    branches:
      - main
concurrency:
  group: production-deploy
  cancel-in-progress: false
permissions:
  contents: write
  issues: write
jobs:
  merge-jd:
    name: Auto-merge jd into main
    runs-on: ubuntu-latest
    outputs:
      conflict: ${{ steps.merge.outputs.conflict }}
      conflict_files: ${{ steps.merge.outputs.conflict_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Fetch jd
        run: git fetch origin jd
      - name: Attempt merge
        id: merge
        run: |
          if git merge origin/jd --no-edit -m "Auto-merge jd into main"; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            files=$(git diff --name-only --diff-filter=U | tr '\n' ',')
            echo "conflict_files=$files" >> "$GITHUB_OUTPUT"
            git merge --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Push merged main
        run: git push origin main

  open-conflict-issue:
    name: Notify on merge conflict
    needs: merge-jd
    if: failure() && needs.merge-jd.outputs.conflict == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ needs.merge-jd.outputs.conflict_files }}`.split(',').filter(Boolean);
            const fileList = files.length ? files.map(f => `- \`${f}\``).join('\n') : '(file list unavailable)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ jd → main auto-merge conflict — deploy skipped',
              body: [
                `Auto-merging \`jd\` into \`main\` failed after the push by @${context.actor}.`,
                '',
                '**Deploy was skipped — production was NOT updated.**',
                '',
                'Conflicting files:',
                fileList,
                '',
                'Resolve manually:',
                '```',
                'git fetch origin',
                'git checkout main',
                'git merge origin/jd',
                '# resolve conflicts, then:',
                'git add <resolved files>',
                'git commit',
                'git push origin main',
                '```'
              ].join('\n'),
              assignees: [context.actor]
            })

  FTP-Deploy-Action:
    name: FTP-Deploy-Action
    needs: merge-jd
    if: needs.merge-jd.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Inject production DB credentials into .env
        run: |
          ENV_FILE="femi9/billing/shared/.env"
          sed -i "s|^DB_HOST=.*|DB_HOST=${{ secrets.PROD_DB_HOST }}|" "$ENV_FILE"
          sed -i "s|^DB_PORT=.*|DB_PORT=${{ secrets.PROD_DB_PORT }}|" "$ENV_FILE"
          sed -i "s|^DB_USERNAME=.*|DB_USERNAME=${{ secrets.PROD_DB_USERNAME }}|" "$ENV_FILE"
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}|" "$ENV_FILE"
          sed -i "s|^DB_NAME=.*|DB_NAME=${{ secrets.PROD_DB_NAME }}|" "$ENV_FILE"
      - name: FTP-Deploy-Action
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}